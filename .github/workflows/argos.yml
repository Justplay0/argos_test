name: Visual tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  argos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        
      - name: Run E2E tests and upload to Argos
        run: npx playwright test tests/full-coverage.spec.ts
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
